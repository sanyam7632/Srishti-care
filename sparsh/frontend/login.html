<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Srishti Care</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 16px;">
          <i class="fas fa-heartbeat"></i> Srishti <span>Care</span>
        </a>
        <h2>Welcome Back</h2>
        <p>Login to manage your health and appointments</p>
      </div>

      <form id="loginForm">
        <!-- Role Selector -->
        <div class="role-selector">
          <label class="role-option">
            <input type="radio" name="role" value="patient" checked required>
            <div class="role-box">
              <i class="fas fa-user-injured"></i>
              <span>Patient</span>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="doctor">
            <div class="role-box">
              <i class="fas fa-user-md"></i>
              <span>Doctor</span>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="admin">
            <div class="role-box">
              <i class="fas fa-user-shield"></i>
              <span>Admin</span>
            </div>
          </label>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="#" class="forgot-password" id="forgotPassLink">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign Up here</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      const session = getSession();
      if (session.role === 'patient') window.location.href = '/patient_dashboard.html';
      else if (session.role === 'doctor') window.location.href = '/doctor_dashboard.html';
      else if (session.role === 'admin') window.location.href = '/admin_dashboard.html';
    }

    // Forgot password handler
    document.getElementById('forgotPassLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Forgot Password', 'Password reset instructions have been simulated. Check your registered inbox!', 'info');
    });

    // Login Form Submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.querySelector('input[name="role"]:checked').value;
      const submitBtn = e.target.querySelector('.auth-submit-btn');

      // Simple validations
      if (!email || !password) {
        showToast('Invalid Input', 'Please enter email and password.', 'warning');
        return;
      }

      // Update button state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

      try {
        const responseData = await apiRequest('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password, role })
        });

        showToast('Success', `Logged in successfully as ${responseData.name}!`, 'success');
        
        // Save session
        saveSession(
          responseData.access_token,
          responseData.role,
          responseData.name,
          responseData.email
        );

        // Redirect based on role
        setTimeout(() => {
          if (responseData.role === 'patient') {
            window.location.href = '/patient_dashboard.html';
          } else if (responseData.role === 'doctor') {
            window.location.href = '/doctor_dashboard.html';
          } else if (responseData.role === 'admin') {
            window.location.href = '/admin_dashboard.html';
          }
        }, 800);

      } catch (error) {
        showToast('Authentication Failed', error.message, 'danger');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    });
  </script>
</body>
</html>
